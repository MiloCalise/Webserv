# ==========================================
# Fichier de configuration de test WebServ
# ==========================================

server {
    # Premier serveur principal
    listen 8080 ;
    server_name localhost ;
    error_page 404 /errors/404.html ;
    client_max_body_size 1000000 ;

    # Route par defaut
    location / {
        root ./www ;
        index index.html ;
        autoindex off ;
        allow_methods GET POST DELETE;
    }

    location /me {
        root ./scripts;
        index me.py;
        allow_methods GET;
        cgi_ext .py /usr/bin/python3;
    }
    location /cgi-bin {
        root ./cgi-bin ;
        allow_methods GET POST ;
        cgi_ext .py /usr/bin/python3 ;
        cgi_ext .php /usr/bin/php-cgi ;
    }

    location /upload_file {
        root ./www/upload_file ;
        allow_methods GET POST DELETE ;
        upload_store ./www/upload_file ;
    }

    # Route pour les fichiers statiques
    location /assets {
        root ./www ;
        autoindex on ;
        allow_methods GET ;
    }
}
